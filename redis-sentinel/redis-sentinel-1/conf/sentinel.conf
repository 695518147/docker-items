port 26379
# bind 192.168.0.103
dir "/tmp"
logfile "/var/redis/log/sentinel.log"
# 指示 Sentinel 去监视一个名为 mymaster 的主服务器， 这个主服务器的 IP 地址为 172.18.0.2 （docker inspect [containerIP]可以获取） 端口号为 6379
# 将这个主服务器判断为失效至少需要 2 个 Sentinel 同意 （只要同意 Sentinel 的数量不达标，自动故障迁移就不会执行）
sentinel monitor mymaster 192.168.0.103 36379 2

sentinel auth-pass mymaster redis_pwd
sentinel deny-scripts-reconfig yes

protected-mode no
# 固定哨兵模式对外的 ip
sentinel announce-ip "192.168.0.103"

# Generated by CONFIG REWRITE
latency-tracking-info-percentiles 50 99 99.9
user default on nopass sanitize-payload ~* &* +@all
sentinel myid d19155b54ad2024cc625916970db5c09ced8a8c4
sentinel config-epoch mymaster 4
sentinel leader-epoch mymaster 4
sentinel current-epoch 4

sentinel known-sentinel mymaster 192.168.0.103 26381 7fbc031419db7507aca49a922fa260f14eebb28d

sentinel known-sentinel mymaster 192.168.0.103 26380 f815a1b0ed5774f7d050f71f75f4e2690366d116

sentinel known-replica mymaster 192.168.0.103 36381

sentinel known-replica mymaster 192.168.0.103 36380

