# 描述 Compose 文件的版本信息
version: "3.8"
name: cluster-manual-6380
# 定义服务，可以多个
services:
  redis-cluster:
    image: redis:latest
    container_name: cluster-manual-start
    networks:
      redis-manual:
        ipv4_address: 172.18.0.2
    volumes:
      - ./redis-cluster-init.sh:/data/redis-cluster-init/init.sh
    entrypoint: ["sh", "/data/redis-cluster-init/init.sh"]
    depends_on:
      - redis-manual-1
      - redis-manual-2
      - redis-manual-3
      - redis-manual-4
      - redis-manual-5
      - redis-manual-6

  redis-manual-1: # 服务名称
    image: redis:latest # 创建容器时所需的镜像
    container_name: redis-manual-1 # 容器名称
    restart: "no" # 容器总是重新启动
    networks:
      redis-manual:
        ipv4_address: 172.18.0.11
    ports:
      - "6385:6379"
      - "16385:16379"
    volumes: # 数据卷，目录挂载
      - ./container/etc_rc.local:/etc/rc.local
      - ./container/redis-manual-1/conf/redis.conf:/etc/redis/redis.conf
      - ./container/redis-manual-1/data:/data
      - ./container/logs/redis-manual-1:/var/redis/log
    command: redis-server /etc/redis/redis.conf # 覆盖容器启动后默认执行的命令

  redis-manual-2:
    image: redis:latest
    container_name: redis-manual-2
    networks:
      redis-manual:
        ipv4_address: 172.18.0.12
    ports:
      - "6380:6379"
      - "16380:16379"
    volumes:
      - ./container/etc_rc.local:/etc/rc.local
      - ./container/redis-manual-2/conf/redis.conf:/etc/redis/redis.conf
      - ./container/redis-manual-2/data:/data
      - ./container/logs/redis-manual-2:/var/redis/log
    command: redis-server /etc/redis/redis.conf

  redis-manual-3:
    image: redis:latest
    container_name: redis-manual-3
    networks:
      redis-manual:
        ipv4_address: 172.18.0.13
    ports:
      - "6381:6379"
      - "16381:16379"
    volumes:
      - ./container/etc_rc.local:/etc/rc.local
      - ./container/redis-manual-3/conf/redis.conf:/etc/redis/redis.conf
      - ./container/redis-manual-3/data:/data
      - ./container/logs/redis-manual-3:/var/redis/log
    command: redis-server /etc/redis/redis.conf

  redis-manual-4:
    image: redis:latest
    container_name: redis-manual-4
    networks:
      redis-manual:
        ipv4_address: 172.18.0.14
    ports:
      - "6382:6379"
      - "16382:16379"
    volumes:
      - ./container/etc_rc.local:/etc/rc.local
      - ./container/redis-manual-4/conf/redis.conf:/etc/redis/redis.conf
      - ./container/redis-manual-4/data:/data
      - ./container/logs/redis-manual-4:/var/redis/log
    command: redis-server /etc/redis/redis.conf

  redis-manual-5:
    image: redis:latest
    container_name: redis-manual-5
    networks:
      redis-manual:
        ipv4_address: 172.18.0.15
    ports:
      - "6383:6379"
      - "16383:16379"
    volumes:
      - ./container/etc_rc.local:/etc/rc.local
      - ./container/redis-manual-5/conf/redis.conf:/etc/redis/redis.conf
      - ./container/redis-manual-5/data:/data
      - ./container/logs/redis-manual-5:/var/redis/log
    command: redis-server /etc/redis/redis.conf

  redis-manual-6:
    image: redis:latest
    container_name: redis-manual-6
    networks:
      redis-manual:
        ipv4_address: 172.18.0.16
    ports:
      - "6384:6379"
      - "16384:16379"
    volumes:
      - ./container/etc_rc.local:/etc/rc.local
      - ./container/redis-manual-6/conf/redis.conf:/etc/redis/redis.conf
      - ./container/redis-manual-6/data:/data
      - ./container/logs/redis-manual-6:/var/redis/log
    command: redis-server /etc/redis/redis.conf

# 自动创建网络，并手动指定IP网段
networks:
  redis-manual:
    ipam:
      config:
        - subnet: 172.18.0.0/16
