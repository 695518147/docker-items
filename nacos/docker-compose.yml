version: "3.8"
services:
  nacos1:
    hostname: nacos1
    container_name: nacos1
    # NACOS_VERSION=v2.3.1
    # NACOS_VERSION=2.0.3
    image: nacos/nacos-server:${NACOS_VERSION}
    volumes:
      - ./cluster-logs/nacos1:/home/nacos/logs
    ports:
      - "7848:7848"
      - "8848:8848"
      - "9848:9848"
    env_file:
      - ./env/nacos.env
    restart: always
    depends_on:
      mysql:
        condition: service_healthy

  nacos2:
    hostname: nacos2
    image: nacos/nacos-server:${NACOS_VERSION}
    container_name: nacos2
    volumes:
      - ./cluster-logs/nacos2:/home/nacos/logs
    ports:
      - "7849:7848"
      - "8849:8848"
      - "9849:9848"
    env_file:
      - ./env/nacos.env
    restart: always
    depends_on:
      mysql:
        condition: service_healthy

  nacos3:
    hostname: nacos3
    image: nacos/nacos-server:${NACOS_VERSION}
    container_name: nacos3
    volumes:
      - ./cluster-logs/nacos3:/home/nacos/logs
    ports:
      - "7850:7848"
      - "8850:8848"
      - "9850:9848"
    env_file:
      - ./env/nacos.env
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
  mysql:
    container_name: mysql
    build:
      context: .
      dockerfile: ./mysql-2306/Dockerfile
    image: mysql:v8.0
    restart: always
    env_file:
      - ./env/mysql.env
    volumes:
      - ./mysql-2306/mysql:/var/lib/mysql
      # - ./mysql-2306/init_nacos:/docker-entrypoint-initdb.d
    ports:
      - "2306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 10

